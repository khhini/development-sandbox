<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <title>Upload Document</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        .upload-area { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; }
        button { margin-top: 15px; background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #upload-status { margin-top: 20px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    {{ template "components/nav" . }}
    <h1>Upload to ./uploads</h1>

    <div class="upload-area">
        <form hx-post="/add-doc" hx-target="#upload-status" hx-encoding="multipart/form-data">
            <input type="file" name="document" required>
            <br>
            <button type="submit">Upload File</button>
        </form>
    </div>

    <div id="upload-status"></div>
</body>
</html>
