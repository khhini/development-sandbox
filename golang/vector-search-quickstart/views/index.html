<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <title>Search App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; line-height: 1.6; color: #333; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        
        .search-item { margin-bottom: 24px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .item-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; }
        .item-name { color: #2c3e50; }
        .item-match { color: #27ae60; }
        .item-description { color: #666; margin: 0; font-size: 0.95rem; }
        
        .loader { color: #999; font-style: italic; display: none; }
        .htmx-request.loader { display: inline; }
    </style>
</head>
<body>
    {{ template "components/nav" . }}
    <h1>Search Food</h1>
    
    <input type="text" 
           name="search" 
           placeholder="Search e.g., 'Gado Gado'..." 
           hx-post="/search" 
           hx-trigger="keyup changed delay:300ms" 
           hx-target="#search-results" 
           hx-indicator=".loader">

    <div class="loader">Updating results...</div>

    <div id="search-results">
        </div>
</body>
</html>
